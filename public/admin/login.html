<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Login — Online Medicine Store</title>
    <link rel="stylesheet" href="/admin/css/admin.css" />
  </head>
  <body>
    <div class="admin-main" style="max-width: 22rem; margin: 3rem auto">
      <h1>Admin login</h1>
      <p style="color: var(--a-muted); font-size: 0.9rem">JWT-secured admin API</p>
      <div id="msg"></div>
      <form id="form" class="grid-form" style="margin-top: 1rem">
        <div>
          <label for="e">Email</label>
          <input id="e" name="email" type="email" required autocomplete="username" />
        </div>
        <div>
          <label for="p">Password</label>
          <input id="p" name="password" type="password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary">Sign in</button>
      </form>
    </div>
    <script type="module" src="/admin/js/admin-login.js"></script>
  </body>
</html>
