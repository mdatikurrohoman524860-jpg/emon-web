<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coupons — Admin</title>
    <link rel="stylesheet" href="/admin/css/admin.css" />
  </head>
  <body>
    <div class="admin-wrap">
      <div id="nav-ph"></div>
      <div class="admin-main">
        <h1>Coupons</h1>
        <div id="msg"></div>
        <form id="add" class="grid-form" style="max-width: 32rem">
          <input name="code" placeholder="CODE" required />
          <input name="discount_percent" type="number" step="0.01" placeholder="%" required />
          <input name="expiry_date" type="date" required />
          <input name="usage_limit" type="number" value="0" title="0 = unlimited" />
          <select name="apply_to" id="apply-to">
            <option value="all">All products</option>
            <option value="category">Category</option>
            <option value="product">Single product</option>
          </select>
          <select name="category_id" id="c-cat"></select>
          <input name="product_id" type="number" placeholder="Product ID" id="c-prod" />
          <label><input type="checkbox" name="is_active" checked /> Active</label>
          <button type="submit" class="btn btn-primary">Create</button>
        </form>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Code</th>
                <th>%</th>
                <th>Expiry</th>
                <th>Used</th>
                <th>Scope</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
    <script type="module" src="/admin/js/admin-coupons.js"></script>
  </body>
</html>
