<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cart — Online Medicine Store</title>
    <meta name="description" content="Shopping cart — checkout or order via WhatsApp." />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body data-page="cart" data-page-title="Cart">
    <div id="site-header-placeholder"></div>
    <main id="main" class="container section">
      <h1>Cart</h1>
      <p id="cart-empty" style="display: none">Your cart is empty. <a href="/shop">Browse shop</a></p>
      <div class="table-wrap">
        <table id="cart-table">
          <thead>
            <tr>
              <th>Item</th>
              <th>Price</th>
              <th>Qty</th>
              <th>Line</th>
              <th></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
      <p style="margin-top: 1rem"><strong>Subtotal:</strong> <span id="cart-subtotal">৳ 0.00</span></p>
      <div style="display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 1rem">
        <a class="btn btn-primary" href="/checkout">Checkout</a>
        <button type="button" class="btn btn-accent" id="cart-whatsapp">WhatsApp order</button>
        <a class="btn btn-outline" href="/shop">Continue shopping</a>
      </div>
    </main>
    <div id="site-footer-placeholder"></div>
    <script type="module">
      import { initLayout } from '/js/layout.js';
      await initLayout();
    </script>
    <script type="module" src="/js/cart.js"></script>
  </body>
</html>
