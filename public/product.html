<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Product — Online Medicine Store</title>
    <meta name="description" content="Medicine details, reviews, and add to cart." />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body data-page="product" data-page-title="Product">
    <div id="site-header-placeholder"></div>
    <main id="main" class="container section">
      <p><a href="/shop">← Back to shop</a></p>
      <div id="product-root"><p>Loading…</p></div>
      <section id="reviews-expand-wrap" class="section reviews-section" style="padding-bottom: 0">
        <h2 class="section-title">Customer reviews</h2>
        <p id="review-summary" class="review-summary-bar"></p>
        <div id="reviews-list" class="reviews-list"></div>
        <div class="reviews-actions">
          <button type="button" class="btn btn-outline" id="btn-view-all-reviews" hidden>View all reviews</button>
          <button type="button" class="btn btn-ghost" id="btn-load-more-reviews" hidden>Load more</button>
        </div>
        <h3 style="margin-top: 2rem">Write a review</h3>
        <form id="review-form" class="form-grid" style="max-width: 32rem">
          <div>
            <label for="rn">Your name</label>
            <input id="rn" name="user_name" required minlength="2" />
          </div>
          <div>
            <label for="rr">Rating</label>
            <select id="rr" name="rating" required>
              <option value="5">5 — Excellent</option>
              <option value="4">4</option>
              <option value="3">3</option>
              <option value="2">2</option>
              <option value="1">1</option>
            </select>
          </div>
          <div style="grid-column: 1 / -1">
            <label for="rc">Comment</label>
            <textarea id="rc" name="comment" maxlength="2000"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Submit review</button>
        </form>
      </section>
    </main>
    <div id="site-footer-placeholder"></div>
    <script type="module">
      import { initLayout } from '/js/layout.js';
      await initLayout();
    </script>
    <script type="module" src="/js/product.js"></script>
  </body>
</html>
